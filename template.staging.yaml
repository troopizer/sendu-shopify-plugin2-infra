AWSTemplateFormatVersion: "2010-09-09"
Description: Sendu staging stack (VPC, ECS, ALB, RDS, Lambda, API Gateway, ECR)

Parameters:
  ProjectName:
    Type: String
    Default: sendu-plugin2
  EnvironmentName:
    Type: String
    Default: staging

  BackendContainerPort:
    Type: Number
    Default: 3000
  BackendDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
  BackendCpu:
    Type: Number
    Default: 512
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096
  BackendMemory:
    Type: Number
    Default: 1024
  BackendHealthCheckPath:
    Type: String
    Default: /up
  BackendImageTag:
    Type: String
    Default: latest

  DatabaseName:
    Type: String
    Default: senduplugin2
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.small
  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
  DatabaseEngineVersion:
    Type: String
    Default: "17"
  DatabaseBackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35

  FrontendImageTag:
    Type: String
    Description: Tag of the frontend Lambda image in frontend ECR repository
    Default: latest

  UpstreamApiTokenSecretId:
    Type: String
    Description: Secrets Manager secret name or ARN containing UPSTREAM_API_TOKEN
    Default: sendu/staging/upstream-api-token
  ShopifyApiKeySecretId:
    Type: String
    Description: Secrets Manager secret name or ARN containing SHOPIFY_API_KEY
    Default: sendu/staging/shopify-api-key
  FrontendLogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warn
      - error

  LambdaMemorySize:
    Type: Number
    Default: 256
  LambdaTimeoutSeconds:
    Type: Number
    Default: 30

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.30.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.1.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-2

  PrivateAppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-1

  PrivateAppSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-2

  PrivateDbSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.20.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-db-1

  PrivateDbSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.21.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-db-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateAppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-rt

  PrivateAppSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnet1
      RouteTableId: !Ref PrivateAppRouteTable

  PrivateAppSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnet2
      RouteTableId: !Ref PrivateAppRouteTable

  PrivateDbRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-db-rt

  PrivateDbSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnet1
      RouteTableId: !Ref PrivateDbRouteTable

  PrivateDbSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnet2
      RouteTableId: !Ref PrivateDbRouteTable

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB inbound web traffic
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-alb-sg

  BackendServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS backend service traffic
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref BackendContainerPort
          ToPort: !Ref BackendContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-backend-sg

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access from ECS and Client VPN CIDR
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BackendServiceSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-db-sg

  BackendEcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${EnvironmentName}-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE

  FrontendEcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${EnvironmentName}-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowLambdaImagePull
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - ecr:BatchGetImage
              - ecr:GetDownloadUrlForLayer
            Condition:
              StringLike:
                aws:sourceArn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-${EnvironmentName}-front

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-${EnvironmentName}-ecs

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: read-db-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseCredentialsSecret

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/${EnvironmentName}/backend
      RetentionInDays: 14

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${EnvironmentName}-backend
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref BackendCpu
      Memory: !Ref BackendMemory
      NetworkMode: awsvpc
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Sub ${BackendEcrRepository.RepositoryUri}:${BackendImageTag}
          PortMappings:
            - ContainerPort: !Ref BackendContainerPort
              Protocol: tcp
          Environment:
            - Name: RAILS_ENV
              Value: !Ref EnvironmentName
            - Name: PORT
              Value: !Sub "${BackendContainerPort}"
            - Name: DB_HOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: DB_NAME
              Value: !Ref DatabaseName
          Secrets:
            - Name: DB_PORT
              ValueFrom: !Sub "${DatabaseCredentialsSecret}:port::"
            - Name: DB_USER
              ValueFrom: !Sub "${DatabaseCredentialsSecret}:username::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${DatabaseCredentialsSecret}:password::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  BackendLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-tg
      TargetType: ip
      Port: !Ref BackendContainerPort
      Protocol: HTTP
      VpcId: !Ref Vpc
      HealthCheckEnabled: true
      HealthCheckPath: !Ref BackendHealthCheckPath
      Matcher:
        HttpCode: 200-399

  BackendListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref BackendLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  BackendService:
    Type: AWS::ECS::Service
    DependsOn:
      - BackendListener
    Properties:
      ServiceName: !Sub ${ProjectName}-${EnvironmentName}-backend
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref BackendDesiredCount
      TaskDefinition: !Ref BackendTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref BackendServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: !Ref BackendContainerPort
          TargetGroupArn: !Ref BackendTargetGroup

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for staging PostgreSQL
      SubnetIds:
        - !Ref PrivateDbSubnet1
        - !Ref PrivateDbSubnet2
      DBSubnetGroupName: !Sub ${ProjectName}-${EnvironmentName}-db-subnets

  DatabaseCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/${EnvironmentName}/rds/master-credentials
      Description: Master credentials for staging PostgreSQL
      GenerateSecretString:
        SecretStringTemplate: '{"username":"sendu_admin","port":"5432"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 24

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-${EnvironmentName}-postgres
      Engine: postgres
      EngineVersion: !Ref DatabaseEngineVersion
      DBName: !Ref DatabaseName
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      PubliclyAccessible: false
      StorageEncrypted: true
      MultiAZ: false
      BackupRetentionPeriod: !Ref DatabaseBackupRetentionDays
      AutoMinorVersionUpgrade: true
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseCredentialsSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseCredentialsSecret}:SecretString:password}}"
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      DeletionProtection: false

  FrontendLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  FrontendLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${EnvironmentName}-front
      RetentionInDays: 14

  FrontendLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${EnvironmentName}-front
      PackageType: Image
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: !Ref LambdaMemorySize
      Role: !GetAtt FrontendLambdaExecutionRole.Arn
      Code:
        ImageUri: !Sub ${FrontendEcrRepository.RepositoryUri}:${FrontendImageTag}

  FrontendHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-front-http-api
      ProtocolType: HTTP

  FrontendHttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FrontendHttpApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !GetAtt FrontendLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  FrontendHttpApiProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FrontendHttpApi
      RouteKey: ANY /{proxy+}
      Target: !Sub integrations/${FrontendHttpApiIntegration}

  FrontendHttpApiRootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FrontendHttpApi
      RouteKey: ANY /
      Target: !Sub integrations/${FrontendHttpApiIntegration}

  FrontendHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref FrontendHttpApi
      StageName: $default
      AutoDeploy: true

  FrontendLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FrontendLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FrontendHttpApi}/*/*

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref Vpc

  BackendEcrRepositoryUri:
    Description: ECR repository URI for backend image pushes
    Value: !GetAtt BackendEcrRepository.RepositoryUri

  FrontendEcrRepositoryUri:
    Description: ECR repository URI for frontend Lambda image pushes
    Value: !GetAtt FrontendEcrRepository.RepositoryUri

  BackendAlbDnsName:
    Description: Public DNS name of backend ALB
    Value: !GetAtt BackendLoadBalancer.DNSName

  BackendBaseUrl:
    Description: Backend base URL exposed through ALB
    Value: !Sub http://${BackendLoadBalancer.DNSName}

  DatabaseEndpointAddress:
    Description: PostgreSQL endpoint hostname
    Value: !GetAtt Database.Endpoint.Address

  DatabaseEndpointPort:
    Description: PostgreSQL endpoint port
    Value: !GetAtt Database.Endpoint.Port

  DatabaseCredentialsSecretArn:
    Description: Secrets Manager ARN containing database credentials
    Value: !Ref DatabaseCredentialsSecret

  FrontendApiUrl:
    Description: API Gateway endpoint used by the frontend runtime
    Value: !GetAtt FrontendHttpApi.ApiEndpoint

  FrontendApiBaseUrl:
    Description: API base URL for VITE_API_BASE_URL
    Value: !Sub ${FrontendHttpApi.ApiEndpoint}/api
